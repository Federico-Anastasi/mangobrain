<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ag" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="agreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="aorange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f97316"/>
    </marker>
    <marker id="apurp" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="720" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ==================== LOGO (top left) ==================== -->
  <g transform="translate(25, 18) scale(1.1)">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
      <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
      <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/>
      <path d="M12 18v4"/>
    </svg>
  </g>
  <text x="60" y="38" font-weight="600" font-size="16" fill="#7c3aed">MangoBrain</text>
  <text x="60" y="52" font-size="11" fill="#9ca3af">How it works</text>

  <!-- ==================== TALL BOXES ==================== -->

  <!-- CODEBASE (left) -->
  <rect x="40" y="165" width="145" height="478" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="112" y="410" text-anchor="middle" font-weight="600" font-size="15" fill="#065f46">Codebase</text>

  <!-- MEMORY (right) -->
  <rect x="675" y="165" width="145" height="478" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="747" y="410" text-anchor="middle" font-weight="600" font-size="15" fill="#9a3412">Memory</text>

  <!-- ==================== CENTER FLOW ==================== -->

  <!-- YOU -->
  <rect x="345" y="68" width="170" height="48" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="430" y="98" text-anchor="middle" font-weight="600" font-size="15" fill="#1e40af">You</text>

  <!-- /discuss -->
  <rect x="345" y="170" width="170" height="48" rx="10" fill="#f3f0ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="430" y="200" text-anchor="middle" font-weight="600" font-size="15" fill="#6d28d9">/discuss</text>

  <!-- task.md (step between /discuss and /task) -->
  <rect x="388" y="244" width="84" height="30" rx="6" fill="#f3f0ff" stroke="#a78bfa" stroke-width="1"/>
  <text x="430" y="264" text-anchor="middle" font-weight="500" font-size="12" fill="#7c3aed">task.md</text>

  <!-- /task group border -->
  <rect x="322" y="294" width="216" height="368" rx="12" fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="335" y="312" font-size="12" fill="#7c3aed" font-weight="600">/task</text>

  <!-- Analyzer -->
  <rect x="350" y="324" width="160" height="46" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="430" y="352" text-anchor="middle" font-weight="500" font-size="14" fill="#374151">Analyzer</text>

  <!-- Executor -->
  <rect x="350" y="416" width="160" height="46" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="430" y="444" text-anchor="middle" font-weight="500" font-size="14" fill="#374151">Executor</text>

  <!-- Verifier -->
  <rect x="350" y="508" width="160" height="46" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="430" y="536" text-anchor="middle" font-weight="500" font-size="14" fill="#374151">Verifier</text>

  <!-- Mem-manager -->
  <rect x="340" y="600" width="180" height="46" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="430" y="628" text-anchor="middle" font-weight="500" font-size="14" fill="#374151">Mem-manager</text>

  <!-- ==================== FLOW ARROWS (center vertical) ==================== -->

  <!-- Top entry arrow (loop re-entry into You) -->
  <line x1="430" y1="40" x2="430" y2="66" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#apurp)"/>

  <!-- You → /discuss (explain task — left arrow, going down) -->
  <line x1="415" y1="116" x2="415" y2="168" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="403" y="148" font-size="11" fill="#6b7280" text-anchor="end">explain task</text>

  <!-- /discuss → You (Q&A — right arrow, going up) -->
  <line x1="445" y1="168" x2="445" y2="116" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="457" y="148" font-size="11" fill="#6b7280">Q&amp;A</text>

  <!-- /discuss → task.md -->
  <line x1="430" y1="218" x2="430" y2="242" stroke="#6b7280" stroke-width="1.2" marker-end="url(#ag)"/>

  <!-- task.md → Analyzer -->
  <line x1="430" y1="274" x2="430" y2="322" stroke="#6b7280" stroke-width="1.2" marker-end="url(#ag)"/>

  <!-- Analyzer → Executor -->
  <line x1="430" y1="370" x2="430" y2="414" stroke="#6b7280" stroke-width="1.2" marker-end="url(#ag)"/>

  <!-- Executor → Verifier -->
  <line x1="430" y1="462" x2="430" y2="506" stroke="#6b7280" stroke-width="1.2" marker-end="url(#ag)"/>

  <!-- Verifier → Mem-manager -->
  <line x1="430" y1="554" x2="430" y2="598" stroke="#6b7280" stroke-width="1.2" marker-end="url(#ag)"/>

  <!-- Bottom exit arrow (next session) -->
  <line x1="430" y1="646" x2="430" y2="702" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#apurp)"/>
  <text x="442" y="685" font-size="12" fill="#7c3aed" font-weight="500">next session</text>

  <!-- ==================== CODE ARROWS (left, green) ==================== -->

  <!-- Codebase → /discuss (read, dashed) -->
  <line x1="187" y1="194" x2="343" y2="194" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#agreen)"/>
  <text x="266" y="187" font-size="12" fill="#059669" text-anchor="middle">explore code</text>

  <!-- Codebase → Analyzer (read, dashed) -->
  <line x1="187" y1="347" x2="348" y2="347" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#agreen)"/>
  <text x="266" y="340" font-size="12" fill="#059669" text-anchor="middle">deep analysis</text>

  <!-- Executor ↔ Codebase (bidirectional) -->
  <line x1="348" y1="433" x2="187" y2="433" stroke="#059669" stroke-width="1.5" marker-end="url(#agreen)"/>
  <line x1="187" y1="445" x2="348" y2="445" stroke="#059669" stroke-width="1.5" marker-end="url(#agreen)"/>
  <text x="266" y="426" font-size="12" fill="#059669" text-anchor="middle">write · edit</text>

  <!-- Verifier → Codebase -->
  <line x1="348" y1="531" x2="187" y2="531" stroke="#059669" stroke-width="1.5" marker-end="url(#agreen)"/>
  <text x="266" y="524" font-size="12" fill="#059669" text-anchor="middle">test</text>

  <!-- ==================== MEMORY ARROWS (right, orange brand) ==================== -->

  <!-- Memory → /discuss (dashed = read) -->
  <line x1="673" y1="194" x2="517" y2="194" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#aorange)"/>
  <text x="595" y="187" font-size="12" fill="#f97316" text-anchor="middle">past decisions</text>

  <!-- Memory → Analyzer (dashed = read) -->
  <line x1="673" y1="347" x2="512" y2="347" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#aorange)"/>
  <text x="595" y="340" font-size="12" fill="#f97316" text-anchor="middle">gotchas</text>

  <!-- Memory → Verifier (dashed = read) -->
  <line x1="673" y1="531" x2="512" y2="531" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#aorange)"/>
  <text x="595" y="524" font-size="12" fill="#f97316" text-anchor="middle">known issues</text>

  <!-- Mem-manager → Memory (solid = write) -->
  <line x1="522" y1="623" x2="673" y2="623" stroke="#f97316" stroke-width="2" marker-end="url(#aorange)"/>
  <text x="595" y="616" font-size="12" fill="#f97316" text-anchor="middle" font-weight="600">save knowledge</text>

  <!-- Memory → You (last session context, L-shaped with rounded corner) -->
  <path d="M 720,165 L 720,98 Q 720,88 710,88 L 517,88" fill="none" stroke="#f97316" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#aorange)"/>
  <text x="625" y="82" font-size="11" fill="#f97316">last session context</text>


  <!-- ==================== ANNOTATION ==================== -->
  <text x="518" y="444" font-size="10" fill="#9ca3af" font-style="italic">no memory</text>

</svg>